---
---
@import "{{ site.theme }}";

/* 1. SHATTER THE NARROW WRAPPER */
#main_content_wrap {
  max-width: 1400px; /* Widens the container significantly */
  margin: 0 auto;
  padding: 2rem 5%;
}

.inner {
  max-width: 100%;
}

/* 2. MODERNIZE TYPOGRAPHY & SPACING */
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  font-size: 1.15rem;
  line-height: 1.7;
  color: #e0e0e0;
}

/* 3. IMPACT-INDUCING HEADINGS */
h1, h2, h3, h4 {
  font-weight: 700;
  letter-spacing: -0.5px;
  margin-top: 2.5rem;
  margin-bottom: 1rem;
}

h1 {
  font-size: 3rem;
  border-bottom: none; /* Removes the old-school slate underline */
}

/* 4. CUSTOM HPC ACCENT COLOR (Optional: CUDA Green) */
a {
  color: #76b900; /* NVIDIA Green */
  text-decoration: none;
  font-weight: 500;
}

a:hover {
  text-decoration: underline;
  color: #92e500;
}

/* 5. CLEAN DROPDOWNS (DETAILS/SUMMARY) */
details {
  background: #252525;
  padding: 15px;
  border-radius: 8px;
  margin-bottom: 15px;
  border-left: 4px solid #76b900;
}

summary {
  font-weight: bold;
  font-size: 1.2rem;
  cursor: pointer;
  outline: none;
}

summary:hover {
  color: #76b900;
}
